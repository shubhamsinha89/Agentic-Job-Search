version: "3.8"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # n8n auth
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      # n8n config
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://${N8N_HOST:-localhost}:5678
      - GENERIC_TIMEZONE=${TIMEZONE:-America/Los_Angeles}
      # Pass API keys as n8n environment variables
      # (referenced in workflow nodes as {{ $env.ANTHROPIC_API_KEY }} etc.)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY}
      - EMAIL_RECIPIENT=${EMAIL_RECIPIENT}
      - RESUME_FILE_PATH=/home/node/resume/resume.md
    volumes:
      - n8n_data:/home/node/.n8n
      - ../resume:/home/node/resume:ro   # mounts local resume/ folder read-only

volumes:
  n8n_data: